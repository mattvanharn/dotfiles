# My kitty customizations — loaded AFTER the dots-hyprland base config.
# Later settings override earlier ones, so anything here takes priority.

shell zsh

# ── Monstera color palette (light) ────────────────────────────────────────────
# Light mode version derived from monstera wallpaper + p10k.zsh color definitions.
# These 16 ANSI colors affect everything in the terminal: Claude Code, tmux,
# bat, git output, etc.

background            #EEF5EE
foreground            #1E2D25
cursor                #8B6914
cursor_text_color     #F2F5F0
selection_background  #C8D5C0
selection_foreground  #1E2D25

# Black (dark forest text/surfaces)
color0  #1E2D25
color8  #3D5446

# Red (errors — muted, doesn't clash with greens)
color1  #8B3A3A
color9  #A04444

# Green (monstera green — MONSTERA_GREEN from p10k)
color2  #3D5C47
color10 #65796C

# Yellow → Gold (GOLD from p10k — darker for readability on light bg)
color3  #8B6914
color11 #B8860B

# Blue → teal-green (no harsh blue; fits the forest palette)
color4  #2A5C52
color12 #4A7A6E

# Magenta → muted sage-purple
color5  #5C4A60
color13 #7A6C7E

# Cyan → teal
color6  #2A5C52
color14 #5A8A7E

# White (light sage — matches the palette tone)
color7  #C8D5C0
color15 #F2F5F0
