# ── Prefix ────────────────────────────────────────────────────────────────────
# Ctrl-Space: doesn't conflict with Hyprland's Super-based binds
unbind C-b
set -g prefix C-Space
bind C-Space send-prefix

# ── General ───────────────────────────────────────────────────────────────────
set -g mouse on                        # click to focus pane/window, scroll works
set -sg escape-time 10                 # no delay after Esc (critical for neovim)
set -g history-limit 50000             # scrollback buffer
set -g base-index 1                    # windows start at 1 (easier to reach)
setw -g pane-base-index 1             # panes start at 1
set -g renumber-windows on             # fill gaps when a window is closed
set -g focus-events on                 # lets neovim know when it gains/loses focus

# ── Colors ────────────────────────────────────────────────────────────────────
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*256col*:Tc"  # true color support

# ── Vi mode ───────────────────────────────────────────────────────────────────
# Matches neovim's modal editing — use v to select, y to yank in copy mode
setw -g mode-keys vi
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-selection-and-cancel

# ── Splits ────────────────────────────────────────────────────────────────────
# | looks like a vertical divider (side-by-side panes)
# - looks like a horizontal divider (top/bottom panes)
# -c preserves the current directory in the new pane
unbind %
unbind '"'
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"  # new window keeps current dir

# ── Pane navigation (mirrors Hyprland: Super+H/J/K/L for window focus) ────────
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# ── Pane resizing (mirrors Hyprland: Super+Shift+H/J/K/L to move windows) ─────
# -r means the key can be repeated without re-pressing prefix
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# ── Window navigation (mirrors Hyprland: Ctrl+Super+H/L for workspaces) ───────
bind -r C-h previous-window
bind -r C-l next-window

# ── Kill (mirrors Hyprland: Super+Q to close window) ──────────────────────────
bind q kill-pane
bind Q kill-window

# ── Session switching ─────────────────────────────────────────────────────────
bind s choose-tree -Zs          # visual session/window picker (replaces default)

# ── Reload config ─────────────────────────────────────────────────────────────
bind r source-file ~/.config/tmux/tmux.conf \; display "Config reloaded"

# ── Status bar — Monstera palette (light) ─────────────────────────────────────
# Derived from wallpaper + p10k.zsh color definitions:
#   #F2F5F0  light sage (bg)
#   #C8D5C0  medium sage (active window bg)
#   #A8BFB0  border/separator
#   #65796C  monstera green (from MONSTERA_GREEN)
#   #1E2D25  dark forest (text)
#   #8B6914  dark gold (from GOLD, darkened for light bg readability)
set -g status-position bottom
set -g status-style "bg=default fg=#1E2D25"
set -g status-left-length 30
set -g status-right-length 30
set -g status-left "#[bg=#65796C,fg=#F2F5F0,bold] #S #[default] "
set -g status-interval 5
set -g status-right "#[fg=#65796C]#{continuum_status}  %H:%M  %Y-%m-%d "
set -g window-status-format " #I:#W#{?window_zoomed_flag,[Z],} "
set -g window-status-current-format " #I:#W#{?window_zoomed_flag,[Z],} "
set -g window-status-current-style "bg=#C8D5C0,fg=#1E2D25,bold"
set -g window-status-style "fg=#7E9385"
set -g pane-border-style "fg=#A8BFB0"
set -g pane-active-border-style "fg=#65796C"
set -g message-style "bg=#C8D5C0,fg=#1E2D25"
set -g copy-mode-match-style "bg=#8B6914,fg=#F2F5F0"
set -g copy-mode-current-match-style "bg=#8B6914,fg=#F2F5F0"

# ── Plugins (TPM) ─────────────────────────────────────────────────────────────
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

# tmux-resurrect: save/restore pane contents and neovim sessions
set -g @resurrect-capture-pane-contents 'on'
set -g @resurrect-strategy-nvim 'session'

# tmux-continuum: auto-save every 15 minutes
# To also auto-restore on tmux start: set -g @continuum-restore 'on'
set -g @continuum-save-interval '15'

# Initialize TPM (must be the last line in tmux.conf)
run '~/.tmux/plugins/tpm/tpm'
